<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="340" viewBox="0 0 1100 340" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1100" height="340" rx="16" fill="url(#bg)" stroke="#30363d"/>
  <rect x="1" y="1" width="1098" height="338" rx="15" fill="none" stroke="#ffffff08"/>

  <!-- grid -->
  <g stroke="#ffffff06" stroke-width="1">
    <line x1="0" y1="85" x2="1100" y2="85"/><line x1="0" y1="170" x2="1100" y2="170"/><line x1="0" y1="255" x2="1100" y2="255"/>
    <line x1="220" y1="0" x2="220" y2="340"/><line x1="440" y1="0" x2="440" y2="340"/><line x1="660" y1="0" x2="660" y2="340"/><line x1="880" y1="0" x2="880" y2="340"/>
  </g>

  <!-- Laptop -->
  <g transform="translate(48,72)">
    <rect x="0" y="0" width="200" height="130" rx="10" fill="#21262d" stroke="#30363d"/>
    <rect x="12" y="12" width="176" height="96" rx="6" fill="#0d1117"/>
    <text x="24" y="36" fill="#58a6ff" font-family="ui-monospace,monospace" font-size="11">&lt;API /&gt;</text>
    <text x="24" y="56" fill="#8b949e" font-family="ui-monospace,monospace" font-size="10">services.deploy()</text>
    <text x="24" y="76" fill="#7ee787" font-family="ui-monospace,monospace" font-size="10">status: 200 OK</text>
    <rect x="40" y="118" width="120" height="8" rx="2" fill="#30363d"/>
    <rect x="0" y="126" width="200" height="10" rx="3" fill="#30363d"/>
  </g>

  <!-- Cloud + Azure -->
  <g transform="translate(300,56)">
    <ellipse cx="90" cy="52" rx="70" ry="36" fill="#21262d" stroke="#0078D4" stroke-width="1.5"/>
    <path d="M55 58c0-18 14-32 32-32 8 0 15 3 20 8 5-12 17-20 30-20 19 0 34 15 34 34 0 2 0 4-.5 6H55z" fill="#0078D422" stroke="#0078D4"/>
    <text x="90" y="58" text-anchor="middle" fill="#58a6ff" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Azure</text>
    <rect x="30" y="100" width="120" height="36" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="90" y="123" text-anchor="middle" fill="#8b949e" font-family="system-ui,sans-serif" font-size="11">Cloud Platform</text>
  </g>

  <!-- Microservices diagram -->
  <g transform="translate(500,48)">
    <rect x="0" y="0" width="220" height="160" rx="12" fill="#161b22" stroke="#30363d"/>
    <text x="16" y="24" fill="#8b949e" font-family="system-ui,sans-serif" font-size="10" letter-spacing="1.2">MICROSERVICES</text>
    <circle cx="55" cy="70" r="22" fill="#21262d" stroke="#58a6ff"/><text x="55" y="74" text-anchor="middle" fill="#58a6ff" font-size="9" font-family="monospace">API</text>
    <circle cx="110" cy="70" r="22" fill="#21262d" stroke="#a371f7"/><text x="110" y="74" text-anchor="middle" fill="#a371f7" font-size="9" font-family="monospace">OCR</text>
    <circle cx="165" cy="70" r="22" fill="#21262d" stroke="#7ee787"/><text x="165" y="74" text-anchor="middle" fill="#7ee787" font-size="9" font-family="monospace">SQL</text>
    <line x1="77" y1="70" x2="88" y2="70" stroke="#30363d" stroke-width="2"/>
    <line x1="132" y1="70" x2="143" y2="70" stroke="#30363d" stroke-width="2"/>
    <rect x="24" y="110" width="172" height="32" rx="6" fill="#0d1117" stroke="#30363d"/>
    <text x="110" y="130" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">REST · Events · Queues</text>
  </g>

  <!-- AI + Analytics -->
  <g transform="translate(760,48)">
    <rect x="0" y="0" width="140" height="72" rx="12" fill="#21262d" stroke="#a371f7" stroke-width="1.5"/>
    <circle cx="70" cy="36" r="18" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="70" y="40" text-anchor="middle" fill="#e6edf3" font-family="system-ui,sans-serif" font-size="11" font-weight="600">AI</text>
    <rect x="0" y="88" width="140" height="72" rx="12" fill="#21262d" stroke="#30363d"/>
    <polyline points="20,140 45,125 70,135 95,115 120,128" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
    <text x="70" y="152" text-anchor="middle" fill="#8b949e" font-family="system-ui,sans-serif" font-size="10">Analytics</text>
  </g>

  <!-- OCR Document -->
  <g transform="translate(920,72)">
    <rect x="0" y="0" width="120" height="136" rx="10" fill="#21262d" stroke="#30363d"/>
    <rect x="16" y="20" width="88" height="6" rx="2" fill="#30363d"/>
    <rect x="16" y="34" width="72" height="6" rx="2" fill="#30363d"/>
    <rect x="16" y="48" width="80" height="6" rx="2" fill="#30363d"/>
    <rect x="16" y="70" width="88" height="44" rx="6" fill="#0d1117" stroke="#58a6ff" stroke-width="1"/>
    <text x="60" y="98" text-anchor="middle" fill="#58a6ff" font-family="system-ui,sans-serif" font-size="11">OCR</text>
  </g>

  <!-- bottom bar -->
  <rect x="48" y="248" width="1004" height="56" rx="12" fill="#161b22" stroke="#30363d"/>
  <circle cx="80" cy="276" r="5" fill="#7ee787"/>
  <text x="96" y="280" fill="#e6edf3" font-family="system-ui,sans-serif" font-size="12">Production systems · Cloud-native · AI-assisted</text>
  <text x="900" y="280" text-anchor="end" fill="#8b949e" font-family="ui-monospace,monospace" font-size="11">jetzasead23</text>
</svg>
